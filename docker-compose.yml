# version: '3.8'  # removed obsolete version

services:
  db:
    image: postgres:15-alpine
    container_name: ioms_db
    environment:
      POSTGRES_USER: ioms_user
      POSTGRES_PASSWORD: ioms_password
      POSTGRES_DB: ioms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ioms_user -d ioms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ioms_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ioms_user:ioms_password@db:5432/ioms_db
      - SECRET_KEY=supersecretkey_change_in_production
      - JWT_ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: ioms_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
